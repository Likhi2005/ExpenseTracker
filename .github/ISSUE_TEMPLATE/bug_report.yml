name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] - "
labels: ["bug"]

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the issue
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Attach screenshots if applicable
